name: Build and Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Run tests
        run: go test ./...

      - name: Build binaries
        run: |
          # Create output directory
          mkdir -p dist

          # Version info
          VERSION="${{ github.ref_name }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/jacebenson/jsn/internal/version"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION#v} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}"

          # Build for multiple platforms
          GOOS=linux GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/jsn_${VERSION}_linux_amd64 ./cmd/jsn/main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/jsn_${VERSION}_linux_arm64 ./cmd/jsn/main.go
          GOOS=darwin GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/jsn_${VERSION}_darwin_amd64 ./cmd/jsn/main.go
          GOOS=darwin GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/jsn_${VERSION}_darwin_arm64 ./cmd/jsn/main.go
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/jsn_${VERSION}_windows_amd64.exe ./cmd/jsn/main.go

      - name: Create archives
        run: |
          cd dist
          for file in jsn_*; do
            # Rename to just 'jsn' or 'jsn.exe' before archiving
            if [[ "$file" == *.exe ]]; then
              mv "$file" "jsn.exe"
              zip "${file%.exe}.zip" "jsn.exe"
              rm "jsn.exe"
            else
              mv "$file" "jsn"
              tar -czf "${file}.tar.gz" "jsn"
              rm "jsn"
            fi
          done
          ls -la

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
